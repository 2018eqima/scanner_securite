services:

  scanner-backend:
    image: eqima/scanner-backend:latest
    container_name: eqima-scanner-backend
    restart: unless-stopped
    environment:
      ZAP_URL: ${ZAP_URL:-https://security.eqima.org}
      ZAP_API_KEY: ${ZAP_API_KEY}
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-eqima_scanner}
      DB_USER: ${DB_USER:-eqima_scanner}
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://auth.eqima.org}
      FRONTEND_URL: ${FRONTEND_URL:-https://preprod.scanner.eqima.org}
    ports:
      - "127.0.0.1:8088:8085"
    networks:
      - infra-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --server-response http://localhost:8085/v1/targets 2>&1 | grep -qE 'HTTP/|401' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  infra-net:
    external: true