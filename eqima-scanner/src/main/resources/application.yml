server:
  port: 8085

spring:
  application:
    name: eqima-scanner
  main:
    web-application-type: reactive
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:eqima_scanner}
    username: ${DB_USER:eqima}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://auth.eqima.org}/realms/eqima

zap:
  url: ${ZAP_URL:https://security.eqima.org}
  api-key: ${ZAP_API_KEY}

openvas:
  host: ${OPENVAS_HOST:127.0.0.1}
  port: ${OPENVAS_PORT:9390}
  user: ${OPENVAS_USER:admin}
  password: ${OPENVAS_PASSWORD:admin}

cors:
  allowed-origin: ${FRONTEND_URL:https://scanner.eqima.org}

eqima:
  targets:
    - id: volanaka
      name: Volanaka Crypto
      icon: crypto
      urls:
        - https://preprod.crypto.volanaka.com
        - https://api.crypto.volanaka.com
      modules:
        - SPIDER
        - ACTIVE_SCAN
        - PASSIVE_SCAN
    - id: convergence
      name: Convergence
      icon: convergence
      urls:
        - https://convergence.eqima.org
        - https://api.convergence.eqima.org
      modules:
        - SPIDER
        - ACTIVE_SCAN
        - PASSIVE_SCAN
    - id: ussd
      name: USSD Aggregator
      icon: ussd
      urls:
        - https://ussd.eqima.org
      modules:
        - SPIDER
        - PASSIVE_SCAN
    - id: jirakaiky
      name: Jirakaiky
      icon: jirakaiky
      urls:
        - https://jirakaiky.eqima.org
      modules:
        - SPIDER
        - ACTIVE_SCAN
        - PASSIVE_SCAN